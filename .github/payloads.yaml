# =============================================================================
# Payload configuration for PS5 UMTX2 auto-update system v2
# =============================================================================
#
# This file defines all payloads and their sources.
# For detailed documentation, see .github/scripts/update_payloads.py (header comments).
#
# Field Reference:
#   id:                Unique identifier (lowercase, hyphens). Used as directory name.
#   displayTitle:      Human-readable name shown in the UI
#   description:       Short description shown in the UI
#   authors:           List of GitHub usernames of contributors
#   projectUrl:        URL to the project's GitHub page
#   sourceType:        'github-release' | 'direct' | 'custom'
#   sourceRepo:        GitHub repo in 'owner/name' format (empty for custom)
#   sourcePattern:     Glob pattern to match release asset name (e.g., 'payload*.elf')
#   toPort:            Port number for network payloads (omit if not applicable)
#   supportedFirmwares: List of supported firmware version prefixes (e.g., ["3.", "4.", "5."])
#   license:           {type: SPDX-ID, url: license-url} - auto-detected if empty
#   manualVersions:    Required for 'direct' sourceType - list of version entries
#
# Adding a new payload via PR:
#   1. Add your entry below following the appropriate pattern (A, B, or C)
#   2. The GitHub Actions workflow will automatically fetch and integrate it
#   3. For 'github-release': ensure your repo has releases with .elf or .bin assets
#   4. For 'direct': provide explicit URLs for each version
#
# =============================================================================

payloads:

  # ===========================================================================
  # Pattern A: github-release (Fully Automated)
  # Use this when the repo has proper GitHub Releases with .elf or .bin assets.
  # The script will automatically fetch all matching releases.
